  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then((reg) => {
              console.log('[SW] Registrado com sucesso. Scope:', reg.scope);

              // Notifica o SW para atualizar quando há nova versão
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker?.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Novo conteúdo disponível — atualiza silenciosamente
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            })
            .catch((err) => console.warn('[SW] Falha no registro:', err));

          // Recarrega a página quando o SW assumir o controle
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            window.location.reload();
          });

          // Periodic Background Sync (se suportado)
          navigator.serviceWorker.ready.then((reg) => {
            if ('periodicSync' in reg) {
              reg.periodicSync
                .register('cgp-periodic-sync', { minInterval: 24 * 60 * 60 * 1000 })
                .catch(() => {}); // Silencia se não houver permissão
            }
          });
        });
      }
    </script>
  </body>
